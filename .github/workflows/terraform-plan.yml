# Terraform Plan — runs on every pull request targeting main
#
# HOW THIS WORKS:
#   When a PR is opened (or updated) against main, this workflow runs
#   `terraform plan` and posts the output as a collapsible comment on the PR.
#   Reviewers can see exactly what infrastructure changes will happen before
#   approving.
#
#   The plan comment is updated in place on subsequent pushes to the same PR,
#   so the conversation doesn't get spammed with stale plans.

name: Terraform Plan

on:
  pull_request:
    branches: [main]

# Prevent multiple plan runs from overlapping on the same PR. If a new commit
# is pushed while a plan is still running, cancel the old one — only the
# latest plan matters.
concurrency:
  group: terraform-plan-${{ github.head_ref }}
  cancel-in-progress: true

# OIDC federation requires id-token:write so GitHub can mint a short-lived
# token that AWS STS trusts.  contents:read lets the job checkout code.
# pull-requests:write lets us post/update the plan comment.
permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  plan:
    name: Plan
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout the PR branch
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Install the Terraform CLI
      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      # 3. Authenticate to AWS using OIDC (no long-lived secrets needed)
      #    The GitHubActionsRole in AWS trusts tokens issued by GitHub for
      #    this repo via an OIDC identity provider.
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::208107893626:role/GitHubActionsRole
          aws-region: ap-southeast-2

      # 4. Initialise the backend (S3 state bucket)
      - name: Terraform Init
        run: terraform init

      # 5. Syntax / provider validation
      - name: Terraform Validate
        run: terraform validate

      # 6. Generate the execution plan and save it to a file.
      #    continue-on-error: true so we can still post the failure output
      #    as a PR comment before marking the job as failed (step 8).
      - name: Terraform Plan
        id: plan
        run: terraform plan -out=plan.tfplan -no-color
        continue-on-error: true

      # 7. Post (or update) a PR comment with the plan output inside a
      #    collapsible <details> block so it doesn't dominate the conversation.
      - name: Comment plan on PR
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const output = `${{ steps.plan.outputs.stdout || '' }}`;
            const outcome = '${{ steps.plan.outcome }}';
            const body = `#### Terraform Plan \`${outcome}\`

            <details><summary>Show plan output</summary>

            \`\`\`terraform
            ${output}
            \`\`\`

            </details>

            *Triggered by @${{ github.actor }} in commit ${{ github.sha }}*`;

            // Look for an existing plan comment to update (avoids spam)
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const marker = '#### Terraform Plan';
            const existing = comments.find(c => c.body.startsWith(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      # 8. Fail the job if the plan itself failed (after we've posted the comment)
      - name: Fail if plan failed
        if: steps.plan.outcome == 'failure'
        run: exit 1
